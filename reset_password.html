<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="container" style="max-width:400px;margin:60px auto;">
        <h2 style="text-align:center;color:#667eea;">Reset Password</h2>
        <form id="resetForm">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required>
            <label for="newPassword">New Password</label>
            <input type="password" id="newPassword" name="newPassword" required>
            <button type="submit" style="width:100%;margin-top:18px;">Reset Password</button>
        </form>
        <div id="resetError" style="color:red;text-align:center;margin-top:10px;"></div>
        <div id="resetSuccess" style="color:green;text-align:center;margin-top:10px;"></div>
        <p style="text-align:center;margin-top:18px;">
            <a href="/login.html">Back to Login</a>
        </p>
    </div>
    <script>
    const apiBase = window.location.port === '5500' ? 'http://127.0.0.1:8001' : '';

    document.getElementById('resetForm').onsubmit = async function(e) {
        e.preventDefault();
        const username = document.getElementById('username').value;
        const newPassword = document.getElementById('newPassword').value;
        const res = await fetch(`${apiBase}/api/reset-password`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({username, new_password: newPassword})
        });
        const data = await res.json();
        if (data.success) {
            document.getElementById('resetSuccess').innerText = 'Password reset successful! Redirecting to login...';
            document.getElementById('resetError').innerText = '';
            setTimeout(() => { window.location.href = '/login.html'; }, 2000);
        } else {
            document.getElementById('resetError').innerText = data.detail || 'Reset failed.';
            document.getElementById('resetSuccess').innerText = '';
        }
    };
    </script>
</body>
</html>
