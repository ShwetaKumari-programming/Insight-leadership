<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat - UPI Analytics</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>AI Analytics Assistant</h1>
            <p>Ask questions on real 250,000 UPI transactions</p>
        </div>

        <div class="chat-toolbar">
            <button type="button" id="newChatBtn" class="toolbar-btn">New Chat</button>
            <button type="button" id="regenerateBtn" class="toolbar-btn">Regenerate</button>
            <button type="button" id="stopBtn" class="toolbar-btn">Stop</button>
            <button type="button" id="exportBtn" class="toolbar-btn">Export</button>
            <span id="connectionStatus" class="chat-badge">Offline</span>
        </div>

        <div class="quick-prompts" id="quickPrompts">
            <button type="button" class="prompt-chip" data-question="What is the current failure rate and top error code?">Failure summary</button>
            <button type="button" class="prompt-chip" data-question="Compare weekend vs weekday failures and explain why.">Weekend comparison</button>
            <button type="button" class="prompt-chip" data-question="Show performance bottlenecks and immediate actions.">Performance actions</button>
        </div>

        <div id="messagesContainer" class="messages-container"></div>

        <div class="input-container">
            <input type="text" id="messageInput" class="message-input" placeholder="Ask about failures, trends, weekend issues, performance..." />
            <button class="send-button" onclick="sendMessage()">Send</button>
        </div>
    </div>
    <script src="/static/chat.js"></script>
</body>
</html>
