<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - UPI Analytics</title>
    <link rel="stylesheet" href="/static/styles.css">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .signup-container {
            max-width: 400px;
            margin: 80px auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.18);
            padding: 40px 30px 30px 30px;
        }
        .signup-container h2 { text-align: center; color: #667eea; margin-bottom: 24px; }
        .signup-container label { font-weight: 600; color: #555; }
        .signup-container input {
            width: 100%; padding: 10px; margin: 10px 0 20px 0; border-radius: 6px; border: 1px solid #ccc;
        }
        .signup-container button {
            width: 100%; padding: 12px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border: none; border-radius: 6px; font-size: 1em; font-weight: 700; cursor: pointer;
        }
        .signup-container .error { color: #e74c3c; text-align: center; margin-bottom: 10px; }
        .signup-container .success { color: #27ae60; text-align: center; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="signup-container">
        <h2>Sign Up</h2>
        <form id="signupForm">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required>
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>
            <label for="role">Role</label>
            <select id="role" name="role">
                <option value="Viewer">Viewer</option>
                <option value="Admin">Admin</option>
            </select>
            <div class="error" id="signupError" style="display:none;"></div>
            <div class="success" id="signupSuccess" style="display:none;"></div>
            <button type="submit">Sign Up</button>
            <div style="text-align:center;margin-top:18px;">
                <a href="/login" style="color:#667eea;font-weight:600;text-decoration:none;">Already have an account? Login</a>
            </div>
        </form>
    </div>
    <script>
    document.getElementById('signupForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const role = document.getElementById('role').value;
        try {
            const res = await fetch('/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password, role })
            });
            const data = await res.json();
            if (res.ok && data.success) {
                document.getElementById('signupSuccess').textContent = 'Registration successful! You can now log in.';
                document.getElementById('signupSuccess').style.display = 'block';
                document.getElementById('signupError').style.display = 'none';
                setTimeout(() => { window.location.href = '/login'; }, 2000);
            } else {
                document.getElementById('signupError').textContent = data.detail || 'Registration failed';
                document.getElementById('signupError').style.display = 'block';
                document.getElementById('signupSuccess').style.display = 'none';
            }
        } catch (err) {
            document.getElementById('signupError').textContent = 'Registration failed';
            document.getElementById('signupError').style.display = 'block';
            document.getElementById('signupSuccess').style.display = 'none';
        }
    });
    </script>
</body>
</html>
