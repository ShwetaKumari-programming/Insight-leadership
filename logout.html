<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logout - UPI Analytics</title>
    <link rel="stylesheet" href="/static/styles.css">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .logout-container {
            max-width: 400px;
            margin: 80px auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.18);
            padding: 40px 30px 30px 30px;
            text-align: center;
        }
        .logout-container h2 { color: #667eea; margin-bottom: 24px; }
        .logout-container button {
            padding: 12px 32px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border: none; border-radius: 6px; font-size: 1em; font-weight: 700; cursor: pointer;
        }
    </style>
</head>
<body>
    <script>
    // Immediately logout and redirect
    localStorage.removeItem('isLoggedIn');
    localStorage.removeItem('userRole');
    window.location.href = '/login.html';
    </script>
</body>
</html>
