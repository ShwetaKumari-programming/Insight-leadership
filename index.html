<head>
    <meta charset="UTF-8">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        </div>


    

    <script>
        // ===== TAB SWITCHING =====
        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + tabName).classList.add('active');
            event.target.classList.add('active');
            
            document.querySelectorAll('.tab-btn').forEach(b => {
                if (b.textContent.toLowerCase().includes(tabName === 'overview' ? 'overview' : tabName === 'scope' ? 'scope' : tabName === 'qa' ? 'q&a' : tabName === 'architecture' ? 'architecture' : 'chat')) {
                    b.classList.add('active');
                }
            });
        }

        
        fetch('/api/qa-stats')
            .then(r => r.json())
            .then(data => {
                const fmt = n => Number(n).toLocaleString();
                const total = data.total_transactions;
                const wf = data.weekend_failure_rate;
                const wd = data.weekday_failure_rate;
                const fr = data.fraud_count;
                const successRate = (100 - ((total - (total * (1 - (wf + wd) / 200))) / total * 100)).toFixed(1);

                
                document.getElementById('statTotal').textContent = fmt(total);
                document.getElementById('statSuccess').textContent = (100 - (12303/total*100)).toFixed(1) + '%';
                document.getElementById('statWeFail').textContent = wf + '%';
                document.getElementById('statWdFail').textContent = wd + '%';
                document.getElementById('statFraud').textContent = fmt(fr);

                
                document.getElementById('headerDataset').textContent = fmt(total) + ' UPI Transactions | 17 Columns | No SQL';

                
                document.querySelectorAll('.totalTxns').forEach(el => el.textContent = fmt(total));
                document.querySelectorAll('.overviewCount').forEach(el => el.textContent = fmt(total));

                
                document.querySelectorAll('.weFail').forEach(el => el.textContent = wf + '%');
                document.querySelectorAll('.wdFail').forEach(el => el.textContent = wd + '%');

                
                document.querySelectorAll('.fraudCount').forEach(el => el.textContent = fmt(fr));

                
                const ov = document.getElementById('overviewTxns');
                if (ov) ov.textContent = fmt(total);
            })
            .catch(() => {
                document.getElementById('headerDataset').textContent = 'UPI Transactions 2024 Dataset';
            });

        
        const messagesContainer = document.getElementById('messagesContainer');
        const messageInput = document.getElementById('messageInput');

        async function sendMessage() {
            const question = messageInput.value.trim();
            if (!question) return;
            addMessage(question, true);
            messageInput.value = '';
            showTypingIndicator();
            try {
                const response = await fetch('/api/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question })
                });
                if (!response.ok) throw new Error('Failed');
                const data = await response.json();
                removeTypingIndicator();
                addMessage(data.response, false);
            } catch (error) {
                removeTypingIndicator();
                addMessage('Sorry, I encountered an error. Make sure the backend is running on localhost:8001', false);
            }
        }

        function addMessage(text, isUser) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'bot'}`;
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.textContent = text;
            messageDiv.appendChild(contentDiv);
            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function showTypingIndicator() {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message bot';
            messageDiv.id = 'typingIndicator';
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.innerHTML = '⏳ Analyzing...';
            messageDiv.appendChild(contentDiv);
            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) indicator.remove();
        }

        messageInput.focus();
    </script>
    </head>
    <body style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; min-height: 100vh; margin: 0; padding: 0;">
    <script>
    if (!localStorage.getItem('isLoggedIn')) {
        window.location.href = '/login.html';
    }
    </script>
        
                <!-- Moved scenario rows from <style> to here -->
                
        <!-- Main Navigation Bar -->
        <nav style="width:100%; background:rgba(255,255,255,0.18); padding:18px 0 10px 0; margin-bottom:32px; box-shadow:0 2px 12px rgba(102,126,234,0.07); display:flex; justify-content:center; gap:32px; border-radius:0 0 18px 18px; font-size:1.13em; font-weight:600;">
            <a href="/dashboard" style="color:#fff; text-decoration:none; padding:8px 18px; border-radius:8px; transition:background 0.2s; background:rgba(102,126,234,0.18);">Dashboard</a>
            <a href="/weekend" style="color:#fff; text-decoration:none; padding:8px 18px; border-radius:8px; transition:background 0.2s; background:rgba(102,126,234,0.18);">Weekend</a>
            <a href="/failures" style="color:#fff; text-decoration:none; padding:8px 18px; border-radius:8px; transition:background 0.2s; background:rgba(102,126,234,0.18);">Failures</a>
            <a href="/trends" style="color:#fff; text-decoration:none; padding:8px 18px; border-radius:8px; transition:background 0.2s; background:rgba(102,126,234,0.18);">Trends</a>
            <a href="/chat" style="color:#fff; text-decoration:none; padding:8px 18px; border-radius:8px; transition:background 0.2s; background:rgba(102,126,234,0.18);">Chat</a>
        </nav>
        <div style="max-width: 600px; margin: 60px auto; background: white; border-radius: 18px; box-shadow: 0 8px 32px rgba(0,0,0,0.18); padding: 40px 32px; text-align: center;">
            <h1 style="color: #667eea; margin-bottom: 18px;">AI Chat Features</h1>
            <ul style="text-align: left; margin: 0 auto 30px auto; max-width: 400px; color: #333; font-size: 1.08em; line-height: 1.7;">
                
            </ul>
            <button onclick="window.location.href='/chat'" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 8px; padding: 14px 38px; font-size: 1.1em; font-weight: bold; cursor: pointer; margin-top: 18px;">Go to Chat</button>
        </div>
        <!-- Floating AI Chat Assistant Widget -->
        <div id="ai-chat-widget" style="position:fixed;bottom:32px;right:32px;z-index:9999;">
            <button id="openChatBtn" style="background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;border:none;border-radius:50%;width:64px;height:64px;box-shadow:0 4px 24px rgba(102,126,234,0.18);font-size:2em;cursor:pointer;display:flex;align-items:center;justify-content:center;">💬</button>
            <div id="chatPopup" style="display:none;position:absolute;bottom:80px;right:0;width:350px;max-width:90vw;background:white;border-radius:18px;box-shadow:0 8px 32px rgba(0,0,0,0.18);overflow:hidden;">
                <div style="background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;padding:16px 20px;font-weight:bold;">AI Chat Assistant <span style="float:right;cursor:pointer;font-size:1.2em;" id="closeChatBtn">×</span></div>
                <div id="widgetMessages" style="height:260px;overflow-y:auto;padding:16px;background:#f7f8fa;"></div>
                <div style="padding:12px 16px;background:#f7f8fa;display:flex;gap:8px;">
                    <input id="widgetInput" type="text" placeholder="Ask me anything..." style="flex:1;padding:8px 12px;border-radius:8px;border:1px solid #ddd;"/>
                    <button id="widgetSendBtn" style="background:#667eea;color:white;border:none;border-radius:8px;padding:8px 18px;font-weight:bold;">Send</button>
                </div>
            </div>
        </div>
        <script>
        // Floating Chat Widget Logic with localStorage persistence
        const openBtn = document.getElementById('openChatBtn');
        const closeBtn = document.getElementById('closeChatBtn');
        const chatPopup = document.getElementById('chatPopup');
        const widgetMessages = document.getElementById('widgetMessages');
        
        if (localStorage.getItem('aiChatOpen') === 'true') chatPopup.style.display = 'block';
        openBtn.onclick = () => { chatPopup.style.display = 'block'; localStorage.setItem('aiChatOpen', 'true'); };
        closeBtn.onclick = () => { chatPopup.style.display = 'none'; localStorage.setItem('aiChatOpen', 'false'); };
        
        function renderHistory() {
            widgetMessages.innerHTML = '';
            const history = JSON.parse(localStorage.getItem('aiChatHistory') || '[]');
            history.forEach(({msg,from}) => appendMsg(msg,from,false));
        }
        // Chat logic (basic, connects to /ws/chat)
        let ws = null;
        function appendMsg(msg, from, save=true) {
            const div = document.createElement('div');
            div.style.margin = '8px 0';
            div.style.textAlign = from === 'user' ? 'right' : 'left';
            div.innerHTML = `<span style="display:inline-block;padding:8px 14px;border-radius:12px;background:${from==='user'?'#667eea':'#e3f2fd'};color:${from==='user'?'#fff':'#1976d2'};max-width:80%;">${msg}</span>`;
            widgetMessages.appendChild(div);
            widgetMessages.scrollTop = 9999;
            if (save) {
                const history = JSON.parse(localStorage.getItem('aiChatHistory') || '[]');
                history.push({msg,from});
                localStorage.setItem('aiChatHistory', JSON.stringify(history));
            }
        }
        function sendWidgetMsg() {
            const input = document.getElementById('widgetInput');
            const msg = input.value.trim();
            if (!msg) return;
            appendMsg(msg, 'user');
            input.value = '';
            if (!ws || ws.readyState !== 1) {
                ws = new WebSocket(`ws://${window.location.host}/ws/chat`);
                ws.onmessage = (event) => {
                    if (event.data === '__END__') return;
                    appendMsg(event.data, 'bot');
                };
                ws.onopen = () => ws.send(msg);
            } else {
                ws.send(msg);
            }
        }
        document.getElementById('widgetSendBtn').onclick = sendWidgetMsg;
        document.getElementById('widgetInput').onkeypress = function(e){ if(e.key==='Enter') sendWidgetMsg(); };
        renderHistory();
        </script>
    </body>
</html>
