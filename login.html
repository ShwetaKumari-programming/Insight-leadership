<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - UPI Analytics</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="auth-shell">
    <div class="auth-card">
        <h2>Login to AI Analytics</h2>
        <p class="auth-subtitle">Sign in to access real-time UPI intelligence chat.</p>
        <form id="loginForm">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required>
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>
            <div class="error" id="loginError" style="display:none;"></div>
            <button type="submit">Login</button>
            <div class="auth-links">
                <a href="/signin.html">New user? Sign in here</a>
                <br>
            </div>
        </form>
    </div>
    </div>
    <script>
    const apiBase = window.location.port === '5500' ? 'http://127.0.0.1:8001' : '';

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        try {
            const res = await fetch(`${apiBase}/api/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();
            if (res.ok && data.success) {
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('userRole', data.role);
                window.location.href = '/chat.html';
            } else {
                document.getElementById('loginError').textContent = data.detail || 'Invalid username or password';
                document.getElementById('loginError').style.display = 'block';
            }
        } catch (err) {
            document.getElementById('loginError').textContent = 'Login failed';
            document.getElementById('loginError').style.display = 'block';
        }
    });
    </script>
</body>
</html>
